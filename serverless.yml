# Healthcare Platform — Serverless Framework

service: healthcare-platform
frameworkVersion: '3'

# ---------------------------------------------------------------------------- #
# Plugins
# ---------------------------------------------------------------------------- #
plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin

# ---------------------------------------------------------------------------- #
# Custom variables — single place to change names across the entire file
# ---------------------------------------------------------------------------- #
custom:
  stage: ${opt:stage, 'dev'}
  serviceName: healthcare-platform-${self:custom.stage}

  settings:
    dev:
      region: us-east-1
      logLevel: DEBUG
      logRetentionDays: 7
      rdsInstanceClass: db.t3.medium
      rdsAllocatedStorage: 20
      powerToolsDev: "true"
    prod:
      region: us-east-1
      logLevel: INFO
      logRetentionDays: 30
      rdsInstanceClass: db.t4g.micro
      rdsAllocatedStorage: 20
      powerToolsDev: "false"

  region: ${self:custom.settings.${self:custom.stage}.region}
  logLevel: ${self:custom.settings.${self:custom.stage}.logLevel}
  logRetentionDays: ${self:custom.settings.${self:custom.stage}.logRetentionDays}

  pythonRequirements:
    layer: true
    dockerizePip: true
    # slim strips test/dist-info/pyc files
    # strip: false required for arm64 — stripping arm64 binaries on x86_64 host breaks them
    slim: true
    strip: false
    useDownloadCache: true
    useStaticCache: true
    noDeploy:
      - boto3
      - botocore
      - aws-lambda-powertools  # Comes from Powertools ARN layer — never pip install

  # Powertools pre-compiled ARN layer — zero import overhead, maintained by AWS
  # Check for latest version: https://docs.powertools.aws.dev/lambda/python/latest/#lambda-layer
  powertoolsLayerArn: arn:aws:lambda:us-east-1:017000801446:layer:AWSLambdaPowertoolsPythonV3-python312-arm64:16

  secrets:
    youtubeApiKey: ${self:custom.serviceName}/youtube-api-key

# ---------------------------------------------------------------------------- #
# Provider — global Lambda defaults (no VPC — eliminates ENI cold-start penalty)
# ---------------------------------------------------------------------------- #
provider:
  name: aws
  runtime: python3.12
  architecture: arm64            # Graviton2 — 20% cheaper, ~13% faster cold start
  stage: ${self:custom.stage}
  region: ${self:custom.region}
  memorySize: 256
  timeout: 29
  versionFunctions: true         # Required for SnapStart
  logRetentionInDays: ${self:custom.logRetentionDays}

  tracing:
    lambda: true
    apiGateway: true

  environment:
    STAGE: ${self:custom.stage}
    REGION: ${self:custom.region}
    DB_SECRET_NAME: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
    DB_HOST: !GetAtt HealthcareRDS.Endpoint.Address
    DB_PORT: !GetAtt HealthcareRDS.Endpoint.Port
    DB_NAME: healthcare_${self:custom.stage}
    YOUTUBE_SECRET_NAME: ${self:custom.secrets.youtubeApiKey}
    SERVICE_NAME: ${self:custom.serviceName}
    LOG_LEVEL: ${self:custom.logLevel}
    # AWS Powertools configuration
    POWERTOOLS_SERVICE_NAME: ${self:custom.serviceName}
    POWERTOOLS_METRICS_NAMESPACE: HealthcarePlatform
    POWERTOOLS_LOGGER_LOG_EVENT: "false"         # Never log full event — contains PHI
    POWERTOOLS_TRACER_CAPTURE_RESPONSE: "false"  # Never capture response — contains PHI
    POWERTOOLS_TRACER_CAPTURE_ERROR: "true"
    POWERTOOLS_DEV: ${self:custom.settings.${self:custom.stage}.powerToolsDev}

  httpApi:
    name: ${self:custom.serviceName}-api
    cors:
      allowedOrigins:
        - https://app.assesment-healthcare.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - OPTIONS

  iam:

# ---------------------------------------------------------------------------- #
# Package — deploy each function independently to minimise cold-start size
# ---------------------------------------------------------------------------- #
package:
  individually: true
  patterns:
    - '!./**'
    - '!node_modules/**'
    - '!.git/**'
    - '!tests/**'
    - '!*.md'
    - '!.env*'
    - '!db/**'
    - '!docs/**'
    - '!__pycache__/**'

# ---------------------------------------------------------------------------- #
# Functions
# ---------------------------------------------------------------------------- #
functions:

  makeMigrations:
    name: ${self:custom.serviceName}-make-migrations
    handler: src/migrations/handler.handler
    description: Apply Migrations to RDS PostgreSQL database (run once on deployment)
    memorySize: 512
    timeout: 25
    role: DbMigrateRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/migrations/**'
        - 'src/shared/**'
        - 'src/__init__.py'
        - 'db/**'
    events:
      - httpApi:
          path: /db/migrations
          method: POST
    environment:
      FUNCTION_NAME: make-migrations

  patientRegister:
    name: ${self:custom.serviceName}-patient-register
    handler: src/patients/handler.handler
    description: Creates a new patient record with hashed PII
    memorySize: 768
    timeout: 25
    role: PatientRegisterRole
    snapStart: true
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/patients/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/register
          method: POST
    environment:
      FUNCTION_NAME: patient-register
      IDEMPOTENCY_TABLE_NAME: !Ref IdempotencyTable

  appointmentsUpcoming:
    name: ${self:custom.serviceName}-appointments-upcoming
    handler: src/appointments/handler.upcoming_handler
    description: Returns a patient's upcoming appointments
    memorySize: 768
    timeout: 15
    role: AppointmentsReadRole
    snapStart: true
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/appointments/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/appointments/upcoming
          method: GET
    environment:
      FUNCTION_NAME: appointments-upcoming

  appointmentNotes:
    name: ${self:custom.serviceName}-appointment-notes
    handler: src/appointments/handler.notes_handler
    description: Allows doctors to upload post-appointment notes
    memorySize: 768
    timeout: 15
    role: AppointmentNotesRole
    snapStart: true
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/appointments/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /appointments/{appointment_id}/notes
          method: POST
    environment:
      FUNCTION_NAME: appointment-notes

  prescriptionList:
    name: ${self:custom.serviceName}-prescription-list
    handler: src/prescriptions/handler.handler
    description: Fetches prescriptions for a patient with active/past filter
    memorySize: 768
    timeout: 15
    role: PrescriptionReadRole
    snapStart: true
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/prescriptions/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/prescriptions
          method: GET
    environment:
      FUNCTION_NAME: prescription-list

  educationVideos:
    name: ${self:custom.serviceName}-education-videos
    handler: src/education/handler.handler
    description: Returns YouTube video recommendations based on patient condition
    memorySize: 768
    timeout: 20
    role: EducationVideosRole
    snapStart: true
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/education/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/education-videos
          method: GET
    environment:
      FUNCTION_NAME: education-videos
      CACHE_TTL_SECONDS: '3600'

# ---------------------------------------------------------------------------- #
# Resources — RDS, Secrets Manager, IAM Roles, CloudWatch
# ---------------------------------------------------------------------------- #
resources:
  Resources:

    # ── Minimal VPC for RDS (Lambda stays VPC-free — no ENI cold start) ─────── #
    # Lambda connects to the public RDS endpoint over the internet.
    # RDS requires its own VPC + subnet group + internet-accessible security group.
    HealthcareVPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsHostnames: true
        EnableDnsSupport: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-vpc

    PublicSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.1.0/24
        AvailabilityZone: ${self:custom.region}a
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-subnet-a

    PublicSubnetB:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.2.0/24
        AvailabilityZone: ${self:custom.region}b
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-subnet-b

    InternetGateway:
      Type: AWS::EC2::InternetGateway
      Properties:
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-igw

    VPCGatewayAttachment:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref HealthcareVPC
        InternetGatewayId: !Ref InternetGateway

    PublicRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref HealthcareVPC

    PublicRoute:
      Type: AWS::EC2::Route
      DependsOn: VPCGatewayAttachment
      Properties:
        RouteTableId: !Ref PublicRouteTable
        DestinationCidrBlock: '0.0.0.0/0'
        GatewayId: !Ref InternetGateway

    SubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetA
        RouteTableId: !Ref PublicRouteTable

    SubnetBRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetB
        RouteTableId: !Ref PublicRouteTable

    # Open port 5432 from anywhere — required because Lambda IPs are dynamic and
    # unpredictable (Lambda runs in AWS-managed network outside this VPC).
    RDSSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Allow PostgreSQL access from public internet (Lambda to RDS)
        VpcId: !Ref HealthcareVPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            CidrIp: '0.0.0.0/0'
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-sg

    RDSSubnetGroup:
      Type: AWS::RDS::DBSubnetGroup
      Properties:
        DBSubnetGroupDescription: Subnet group for healthcare RDS (public subnets)
        SubnetIds:
          - !Ref PublicSubnetA
          - !Ref PublicSubnetB

    # ── RDS PostgreSQL ────────────────────────────────────────────────────── #
    HealthcareRDS:
      Type: AWS::RDS::DBInstance
      DeletionPolicy: Snapshot
      Properties:
        DBInstanceClass: ${self:custom.settings.${self:custom.stage}.rdsInstanceClass}
        Engine: postgres
        EngineVersion: '16.3'
        AllocatedStorage: ${self:custom.settings.${self:custom.stage}.rdsAllocatedStorage}
        StorageType: gp2
        DBName: healthcare_${self:custom.stage}
        MasterUsername: healthcare_admin
        ManageMasterUserPassword: true
        VPCSecurityGroups:
          - !Ref RDSSecurityGroup
        DBSubnetGroupName: !Ref RDSSubnetGroup
        MultiAZ: false
        PubliclyAccessible: true
        BackupRetentionPeriod: 7
        StorageEncrypted: true
        EnablePerformanceInsights: false
        Tags:
          - Key: Environment
            Value: ${self:custom.stage}

    # ── Secrets Manager ───────────────────────────────────────────────────── #
    YoutubeApiKeySecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: ${self:custom.secrets.youtubeApiKey}
        Description: YouTube Data API v3 key for education video recommendations
        SecretString: '{"api_key": "REPLACE_WITH_ACTUAL_KEY"}'

    # ── Shared IAM Managed Policies ───────────────────────────────────────── #
    XRayTracingPolicy:
      Type: AWS::IAM::ManagedPolicy
      Properties:
        ManagedPolicyName: ${self:custom.serviceName}-xray-tracing
        Description: Allows Lambda functions to send X-Ray trace data
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: '*'

    # ── IAM Roles — one per function, least-privilege ─────────────────────── #

    DbMigrateRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-db-migrate-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-make-migrations:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    PatientRegisterRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-patient-register-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-patient-register:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
          - PolicyName: IdempotencyTable
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:PutItem
                    - dynamodb:GetItem
                    - dynamodb:UpdateItem
                    - dynamodb:DeleteItem
                  Resource: !GetAtt IdempotencyTable.Arn

    AppointmentsReadRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-appointments-read-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-appointments-upcoming:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    AppointmentNotesRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-appointment-notes-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-appointment-notes:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    PrescriptionReadRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-prescription-read-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-prescription-list:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    EducationVideosRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-education-videos-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-education-videos:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource:
                    - !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
                    - !Ref YoutubeApiKeySecret

    # ── CloudWatch Log Groups (explicit — controls retention) ─────────────── #

    PatientRegisterLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-patient-register
        RetentionInDays: ${self:custom.logRetentionDays}

    AppointmentsUpcomingLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-appointments-upcoming
        RetentionInDays: ${self:custom.logRetentionDays}

    AppointmentNotesLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-appointment-notes
        RetentionInDays: ${self:custom.logRetentionDays}

    PrescriptionListLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-prescription-list
        RetentionInDays: ${self:custom.logRetentionDays}

    EducationVideosLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-education-videos
        RetentionInDays: ${self:custom.logRetentionDays}

    # ── CloudWatch Metric Filters (fragile string parsing) REMOVED ─────────── #
    # All error metrics are now emitted via Powertools EMF — no filter patterns needed.
    # UnhandledException metric is published atomically with each log line.
    # PHILeakMetricFilter retained as a compliance safety net (not an error metric).
    # ── Idempotency DynamoDB Table (patient registration dedup) ─────────────── #
    IdempotencyTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.serviceName}-idempotency
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: expiration
          Enabled: true
        Tags:
          - Key: Environment
            Value: ${self:custom.stage}

    PHILeakMetricFilter:
      Type: AWS::Logs::MetricFilter
      DependsOn: PatientRegisterLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-patient-register
        FilterPattern: '"[REDACTED]"'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: PHILeakAttemptCount
            MetricValue: "1"
            DefaultValue: 0

    # ── CloudWatch Alarms ─────────────────────────────────────────────────── #

    LambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.serviceName}-lambda-errors
        AlarmDescription: >
          5+ unhandled Lambda exceptions in 5 minutes (EMF metric from Powertools).
          Investigate immediately - this may indicate a database outage,
          Secrets Manager failure, or unhandled exception in production.
        Namespace: HealthcarePlatform
        MetricName: UnhandledException
        Dimensions:
          - Name: service
            Value: ${self:custom.serviceName}
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    PHILeakAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.serviceName}-phi-leak-attempt
        AlarmDescription: >
          CRITICAL COMPLIANCE ALERT: PHI value scrubber triggered in a log entry.
          A value matching an email, phone, DOB, or SSN pattern was intercepted
          before it reached CloudWatch. Investigate which code path triggered this
          and fix the root cause immediately. Even one occurrence is unacceptable.
        Namespace: HealthcarePlatform/${self:custom.stage}
        MetricName: PHILeakAttemptCount
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

  Outputs:
    RDSEndpoint:
      Description: RDS PostgreSQL public endpoint
      Value: !GetAtt HealthcareRDS.Endpoint.Address
      Export:
        Name: ${self:custom.serviceName}-rds-endpoint
