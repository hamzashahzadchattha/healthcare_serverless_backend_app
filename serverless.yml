    # ── CloudWatch Metric Filters (fragile string parsing) REMOVED ─────────── #
    # All error metrics are now emitted via Powertools EMF — no filter patterns needed.
    # UnhandledException metric is published atomically with each log line.
    # PHILeakMetricFilter retained as a compliance safety net (not an error metric).
    # ── Idempotency DynamoDB Table (patient registration dedup) ─────────────── #
    IdempotencyTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.serviceName}-idempotency
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: expiration
          Enabled: true
        Tags:
          - Key: Environment
            Value: ${self:custom.stage}

    PHILeakMetricFilter:
      Type: AWS::Logs::MetricFilter
      DependsOn: PatientRegisterLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-patient-register
        FilterPattern: '"[REDACTED]"'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: PHILeakAttemptCount
            MetricValue: "1"
            DefaultValue: 0

    # ── CloudWatch Alarms ─────────────────────────────────────────────────── #

    LambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.serviceName}-lambda-errors
        AlarmDescription: >
          5+ unhandled Lambda exceptions in 5 minutes (EMF metric from Powertools).
          Investigate immediately - this may indicate a database outage,
          Secrets Manager failure, or unhandled exception in production.
        Namespace: HealthcarePlatform
        MetricName: UnhandledException
        Dimensions:
          - Name: service
            Value: ${self:custom.serviceName}
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    PHILeakAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.serviceName}-phi-leak-attempt
        AlarmDescription: >
          CRITICAL COMPLIANCE ALERT: PHI value scrubber triggered in a log entry.
          A value matching an email, phone, DOB, or SSN pattern was intercepted
          before it reached CloudWatch. Investigate which code path triggered this
          and fix the root cause immediately. Even one occurrence is unacceptable.
        Namespace: HealthcarePlatform/${self:custom.stage}
        MetricName: PHILeakAttemptCount
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    # ── $default catch-all route ──────────────────────────────────────────── #
    # Serverless Framework v3 does not support $default in httpApi events, so
    # the route and its Lambda permission are defined here as raw CloudFormation.
    # This ensures all unmatched requests return the structured error envelope
    # instead of API Gateway's raw {"message": "Not Found"}.
    FallbackDefaultRoute:
      Type: AWS::ApiGatewayV2::Route
      Properties:
        ApiId: !Ref HttpApi
        RouteKey: $default
        Target: !Sub 'integrations/${FallbackDefaultIntegration}'

    FallbackDefaultIntegration:
      Type: AWS::ApiGatewayV2::Integration
      Properties:
        ApiId: !Ref HttpApi
        IntegrationType: AWS_PROXY
        IntegrationUri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations'
          - FunctionArn: !GetAtt FallbackLambdaFunction.Arn
        PayloadFormatVersion: '2.0'

    FallbackDefaultRoutePermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName: !GetAtt FallbackLambdaFunction.Arn
        Action: lambda:InvokeFunction
        Principal: apigateway.amazonaws.com
        SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  Outputs:
    RDSEndpoint:
      Description: RDS PostgreSQL public endpoint
      Value: !GetAtt HealthcareRDS.Endpoint.Address
      Export:
        Name: ${self:custom.serviceName}-rds-endpoint

    UserPoolId:
      Description: Cognito User Pool ID
      Value: !Ref CognitoUserPool
      Export:
        Name: ${self:custom.serviceName}-user-pool-id

    AppClientId:
      Description: Cognito App Client ID
      Value: !Ref CognitoAppClient
      Export:
        Name: ${self:custom.serviceName}-app-client-id

    HostedUIDomain:
      Description: Cognito Hosted UI domain
      Value: !Ref CognitoUserPoolDomain
      Export:
        Name: ${self:custom.serviceName}-hosted-ui-domain

    IdpResponseUrl:
      Description: Cognito IdP response URL for social provider callback configuration
      Value: !Sub 'https://${CognitoUserPoolDomain}.auth.${self:custom.region}.amazoncognito.com/oauth2/idpresponse'
      Export:
        Name: ${self:custom.serviceName}-idp-response-url
