# Healthcare Platform — Serverless Framework

service: healthcare-platform
frameworkVersion: '3'

# ---------------------------------------------------------------------------- #
# Plugins
# ---------------------------------------------------------------------------- #
plugins:
  - serverless-python-requirements

useDotenv: true

# ---------------------------------------------------------------------------- #
# Custom variables — single place to change names across the entire file
# ---------------------------------------------------------------------------- #
custom:
  stage: ${opt:stage, 'dev'}
  serviceName: healthcare-platform-${self:custom.stage}

  settings:
    dev:
      region: us-east-1
      logLevel: DEBUG
      logRetentionDays: 7
      rdsInstanceClass: db.t3.medium
      rdsAllocatedStorage: 20
      powerToolsDev: "true"
    prod:
      region: us-east-1
      logLevel: INFO
      logRetentionDays: 30
      rdsInstanceClass: db.t4g.micro
      rdsAllocatedStorage: 20
      powerToolsDev: "false"

  region: ${self:custom.settings.${self:custom.stage}.region}
  logLevel: ${self:custom.settings.${self:custom.stage}.logLevel}
  logRetentionDays: ${self:custom.settings.${self:custom.stage}.logRetentionDays}

  pythonRequirements:
    layer:
      name: ${self:custom.serviceName}-base-layer
    dockerizePip: true
    # slim strips test/dist-info/pyc files
    # strip: false required for arm64 — stripping arm64 binaries on x86_64 host breaks them
    slim: true
    strip: false
    useDownloadCache: true
    useStaticCache: true
    # Base layer uses requirements-base.txt — bcrypt and requests are excluded here
    # and provided via function-specific layers to minimise cold-start package size.
    fileName: requirements-base.txt
    noDeploy:
      - boto3
      - botocore
      - aws-lambda-powertools  # Comes from Powertools ARN layer — never pip install
      - bcrypt                 # patients-only — attached only to patientRegister
      - requests               # education-only — attached only to educationVideos

  # Powertools pre-compiled ARN layer — zero import overhead, maintained by AWS
  powertoolsLayerArn: arn:aws:lambda:us-east-1:017000801446:layer:AWSLambdaPowertoolsPythonV3-python312-arm64:16

  secrets:
    youtubeApiKey: ${self:custom.serviceName}/youtube-api-key

  cognito:
    googleClientId: ${env:GOOGLE_CLIENT_ID}
    googleClientSecret: ${env:GOOGLE_CLIENT_SECRET}
    # Apple Sign in credentials — add when ready to enable Apple IdP
    # appleServicesId: ${env:APPLE_SERVICES_ID}
    # appleTeamId: ${env:APPLE_TEAM_ID}
    # appleKeyId: ${env:APPLE_KEY_ID}
    # applePrivateKey: ${env:APPLE_PRIVATE_KEY}

# ---------------------------------------------------------------------------- #
# Provider — global Lambda defaults
# Lambda functions are VPC-attached to reach RDS Proxy over a private network.
# ---------------------------------------------------------------------------- #
provider:
  name: aws
  runtime: python3.12
  architecture: arm64
  stage: ${self:custom.stage}
  region: ${self:custom.region}
  memorySize: 256
  timeout: 29
  versionFunctions: true
  logRetentionInDays: ${self:custom.logRetentionDays}

  tracing:
    lambda: true
    apiGateway: true

  environment:
    STAGE: ${self:custom.stage}
    REGION: ${self:custom.region}
    DB_SECRET_NAME: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
    DB_HOST: !GetAtt HealthcareDBProxy.Endpoint
    DB_PORT: !GetAtt HealthcareRDS.Endpoint.Port
    DB_NAME: healthcare_${self:custom.stage}
    YOUTUBE_SECRET_NAME: ${self:custom.secrets.youtubeApiKey}
    SERVICE_NAME: ${self:custom.serviceName}
    LOG_LEVEL: ${self:custom.logLevel}
    # AWS Powertools configuration
    POWERTOOLS_SERVICE_NAME: ${self:custom.serviceName}
    POWERTOOLS_METRICS_NAMESPACE: HealthcarePlatform
    POWERTOOLS_LOGGER_LOG_EVENT: "false"
    POWERTOOLS_TRACER_CAPTURE_RESPONSE: "false"
    POWERTOOLS_TRACER_CAPTURE_ERROR: "true"
    POWERTOOLS_DEV: ${self:custom.settings.${self:custom.stage}.powerToolsDev}
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_APP_CLIENT_ID: !Ref CognitoAppClient

  httpApi:
    name: ${self:custom.serviceName}-api
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'
        audience:
          - !Ref CognitoAppClient
    cors:
      allowedOrigins:
        - https://app.assesment-healthcare.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - OPTIONS

  vpc:
    securityGroupIds:
      - !Ref LambdaSecurityGroup
    subnetIds:
      - !Ref PrivateSubnetA
      - !Ref PrivateSubnetB

  iam:

# ---------------------------------------------------------------------------- #
# Package — deploy each function independently to minimise cold-start size
# ---------------------------------------------------------------------------- #
package:
  individually: true
  patterns:
    # Global exclusions applied to every function package.
    # src/** is excluded here — each function re-includes only its own src/ dirs.
    - '!src/**'
    - '!node_modules/**'
    - '!.git/**'
    - '!tests/**'
    - '!docs/**'
    - '!db/**'
    - '!layers/**'
    - '!env/**'
    - '!venv/**'
    - '!.serverless/**'
    - '!.kiro/**'
    - '!.vscode/**'
    - '!.pytest_cache/**'
    - '!**/__pycache__/**'
    - '!**/*.pyc'
    - '!*.md'
    - '!.env*'
    - '!requirements*.txt'
    - '!package*.json'
    - '!pytest.ini'
    - '!api_postman_collection.json'
    - '!.hypothesis'

# ---------------------------------------------------------------------------- #
# Layers — function-specific pip dependency layers
# Base layer (psycopg2, pydantic) is built by serverless-python-requirements.
# Patients and education layers are defined here to keep bcrypt and requests
# out of the base layer, reducing cold-start package size for all other functions.
# ---------------------------------------------------------------------------- #
layers:

  patients:
    name: ${self:custom.serviceName}-patients-layer
    description: bcrypt — used only by patientRegister
    compatibleArchitectures:
      - arm64
    path: layers/patients

  education:
    name: ${self:custom.serviceName}-education-layer
    description: requests — used only by educationVideos
    compatibleArchitectures:
      - arm64
    path: layers/education

# ---------------------------------------------------------------------------- #
# Functions
# ---------------------------------------------------------------------------- #
functions:

  # $default catch-all — handles all unmatched routes with a consistent error envelope.
  fallback:
    name: ${self:custom.serviceName}-fallback
    handler: src/shared/fallback_handler.handler
    description: Returns structured error envelope for unmatched routes and gateway errors
    memorySize: 128
    timeout: 5
    role: FallbackRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/shared/**'
        - 'src/__init__.py'
    environment:
      FUNCTION_NAME: fallback

  makeMigrations:
    name: ${self:custom.serviceName}-make-migrations
    handler: src/migrations/handler.handler
    description: Apply Migrations to RDS PostgreSQL database (run once on deployment)
    memorySize: 512
    timeout: 25
    role: DbMigrateRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/migrations/**'
        - 'src/shared/**'
        - 'src/__init__.py'
        - 'db/**'
    events:
      - httpApi:
          path: /db/migrations
          method: POST
    environment:
      FUNCTION_NAME: make-migrations

  patientRegister:
    name: ${self:custom.serviceName}-patient-register
    handler: src/patients/handler.handler
    description: Creates a new patient record with hashed PII
    memorySize: 512
    timeout: 25
    role: PatientRegisterRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - Ref: PatientsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/patients/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/register
          method: POST
    environment:
      FUNCTION_NAME: patient-register
      IDEMPOTENCY_TABLE_NAME: !Ref IdempotencyTable

  # Benchmark variant — stdlib dataclasses only, no Pydantic, 256 MB.
  # Endpoint: POST /patients/register-dc
  # Compare cold-start and p99 against patientRegister via X-Ray or Power Tuning.
  patientRegisterDc:
    name: ${self:custom.serviceName}-patient-register-dc
    handler: src/patients_dc/handler.handler
    description: Benchmark variant of patient registration using stdlib dataclasses (no Pydantic)
    memorySize: 512
    timeout: 25
    role: PatientRegisterDcRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - Ref: PatientsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/patients_dc/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/register-dc
          method: POST
    environment:
      FUNCTION_NAME: patient-register-dc

  appointmentsUpcoming:
    name: ${self:custom.serviceName}-appointments-upcoming
    handler: src/appointments/handler.upcoming_handler
    description: Returns a patient's upcoming appointments
    memorySize: 512
    timeout: 15
    role: AppointmentsReadRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/appointments/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/appointments/upcoming
          method: GET
          authorizer:
            name: cognitoAuthorizer
    environment:
      FUNCTION_NAME: appointments-upcoming

  appointmentNotes:
    name: ${self:custom.serviceName}-appointment-notes
    handler: src/appointments/handler.notes_handler
    description: Allows doctors to upload post-appointment notes
    memorySize: 512
    timeout: 15
    role: AppointmentNotesRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/appointments/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /appointments/{appointment_id}/notes
          method: POST
          authorizer:
            name: cognitoAuthorizer
    environment:
      FUNCTION_NAME: appointment-notes

  prescriptionList:
    name: ${self:custom.serviceName}-prescription-list
    handler: src/prescriptions/handler.handler
    description: Fetches prescriptions for a patient with active/past filter
    memorySize: 512
    timeout: 15
    role: PrescriptionReadRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/prescriptions/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/prescriptions
          method: GET
          authorizer:
            name: cognitoAuthorizer
    environment:
      FUNCTION_NAME: prescription-list

  educationVideos:
    name: ${self:custom.serviceName}-education-videos
    handler: src/education/handler.handler
    description: Returns YouTube video recommendations based on patient condition
    memorySize: 512
    timeout: 20
    role: EducationVideosRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - Ref: EducationLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/education/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/education-videos
          method: GET
          authorizer:
            name: cognitoAuthorizer
    environment:
      FUNCTION_NAME: education-videos
      CACHE_TTL_SECONDS: '3600'

  adminPatients:
    name: ${self:custom.serviceName}-admin-patients
    handler: src/admin/handler.list_handler
    description: Admin endpoint — paginated list of all patients
    memorySize: 512
    timeout: 15
    role: AdminPatientsRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/admin/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /admin/patients
          method: GET
          authorizer:
            name: cognitoAuthorizer
    environment:
      FUNCTION_NAME: admin-patients

  adminPatientDetail:
    name: ${self:custom.serviceName}-admin-patients-detail
    handler: src/admin/handler.detail_handler
    description: Admin endpoint — single patient record by ID
    memorySize: 512
    timeout: 15
    role: AdminPatientsRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/admin/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /admin/patients/{patient_id}
          method: GET
          authorizer:
            name: cognitoAuthorizer
    environment:
      FUNCTION_NAME: admin-patients-detail

  # ── Auth endpoints — Cognito signup/verify/signin/logout ─────────────────── #
  # These call Cognito (public AWS endpoint) so VPC attachment is not needed.
  # vpc: is intentionally omitted — overrides the provider-level VPC default.
  authSignup:
    name: ${self:custom.serviceName}-auth-signup
    handler: src/auth/signup.handler
    description: Register a new user in Cognito — sends OTP verification email
    memorySize: 256
    timeout: 15
    role: AuthRole
    vpc: ~
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/auth/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /auth/signup
          method: POST
    environment:
      FUNCTION_NAME: auth-signup

  authVerify:
    name: ${self:custom.serviceName}-auth-verify
    handler: src/auth/verify.handler
    description: Confirm signup with the OTP sent by Cognito
    memorySize: 256
    timeout: 15
    role: AuthRole
    vpc: ~
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/auth/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /auth/verify
          method: POST
    environment:
      FUNCTION_NAME: auth-verify

  authSignin:
    name: ${self:custom.serviceName}-auth-signin
    handler: src/auth/signin.handler
    description: Authenticate with email/password and return Cognito tokens
    memorySize: 256
    timeout: 15
    role: AuthRole
    vpc: ~
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/auth/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /auth/signin
          method: POST
    environment:
      FUNCTION_NAME: auth-signin

  authLogout:
    name: ${self:custom.serviceName}-auth-logout
    handler: src/auth/logout.handler
    description: Globally revoke Cognito tokens for the caller
    memorySize: 256
    timeout: 15
    role: AuthRole
    vpc: ~
    layers:
      - Ref: PythonRequirementsLambdaLayer
      - ${self:custom.powertoolsLayerArn}
    package:
      patterns:
        - 'src/auth/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /auth/logout
          method: POST
    environment:
      FUNCTION_NAME: auth-logout

# ---------------------------------------------------------------------------- #
# Resources — RDS, Secrets Manager, IAM Roles, CloudWatch
# ---------------------------------------------------------------------------- #
resources:
  Resources:

    # ── VPC — private subnets for Lambda and RDS Proxy ──────────────────────── #
    HealthcareVPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsHostnames: true
        EnableDnsSupport: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-vpc

    PublicSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.1.0/24
        AvailabilityZone: ${self:custom.region}a
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-subnet-a

    PublicSubnetB:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.2.0/24
        AvailabilityZone: ${self:custom.region}b
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-subnet-b

    InternetGateway:
      Type: AWS::EC2::InternetGateway
      Properties:
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-igw

    VPCGatewayAttachment:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref HealthcareVPC
        InternetGatewayId: !Ref InternetGateway

    PublicRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref HealthcareVPC

    PublicRoute:
      Type: AWS::EC2::Route
      DependsOn: VPCGatewayAttachment
      Properties:
        RouteTableId: !Ref PublicRouteTable
        DestinationCidrBlock: '0.0.0.0/0'
        GatewayId: !Ref InternetGateway

    SubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetA
        RouteTableId: !Ref PublicRouteTable

    SubnetBRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetB
        RouteTableId: !Ref PublicRouteTable

    PrivateSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.10.0/24
        AvailabilityZone: ${self:custom.region}a
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-private-a

    PrivateSubnetB:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.11.0/24
        AvailabilityZone: ${self:custom.region}b
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-private-b

    PrivateRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref HealthcareVPC
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-private-rt

    PrivateSubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetA
        RouteTableId: !Ref PrivateRouteTable

    PrivateSubnetBRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetB
        RouteTableId: !Ref PrivateRouteTable

    NatGatewayEIP:
      Type: AWS::EC2::EIP
      DependsOn: VPCGatewayAttachment

    NatGateway:
      Type: AWS::EC2::NatGateway
      Properties:
        AllocationId: !GetAtt NatGatewayEIP.AllocationId
        SubnetId: !Ref PublicSubnetA
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-nat

    PrivateInternetRoute:
      Type: AWS::EC2::Route
      Properties:
        RouteTableId: !Ref PrivateRouteTable
        DestinationCidrBlock: '0.0.0.0/0'
        NatGatewayId: !Ref NatGateway

    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for Lambda functions
        VpcId: !Ref HealthcareVPC
        SecurityGroupEgress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            CidrIp: 10.0.0.0/16
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: 0.0.0.0/0
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-lambda-sg

    RDSProxySecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for RDS Proxy
        VpcId: !Ref HealthcareVPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            SourceSecurityGroupId: !Ref LambdaSecurityGroup
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-proxy-sg

    RDSSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for RDS (accepts traffic from RDS Proxy SG)
        VpcId: !Ref HealthcareVPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            SourceSecurityGroupId: !Ref RDSProxySecurityGroup
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-sg

    RDSSubnetGroup:
      Type: AWS::RDS::DBSubnetGroup
      Properties:
        DBSubnetGroupDescription: Subnet group for healthcare RDS
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB

    # ── RDS PostgreSQL ────────────────────────────────────────────────────── #
    HealthcareRDS:
      Type: AWS::RDS::DBInstance
      DeletionPolicy: Snapshot
      Properties:
        DBInstanceClass: ${self:custom.settings.${self:custom.stage}.rdsInstanceClass}
        Engine: postgres
        EngineVersion: '16.4'
        AllocatedStorage: ${self:custom.settings.${self:custom.stage}.rdsAllocatedStorage}
        StorageType: gp2
        DBName: healthcare_${self:custom.stage}
        MasterUsername: healthcare_admin
        ManageMasterUserPassword: true
        VPCSecurityGroups:
          - !Ref RDSSecurityGroup
        DBSubnetGroupName: !Ref RDSSubnetGroup
        MultiAZ: false
        PubliclyAccessible: false
        BackupRetentionPeriod: 7
        StorageEncrypted: true
        EnablePerformanceInsights: false
        Tags:
          - Key: Environment
            Value: ${self:custom.stage}

    # ── RDS Proxy (connection pooling & resilience) ───────────────────── #
    # Proxy endpoint is used by Lambdas via DB_HOST.
    DBProxyRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-db-proxy-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: rds.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: DBProxySecretsRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                    - secretsmanager:DescribeSecret
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
                # Allow decryption in case the RDS-managed secret uses a customer KMS key.
                - Effect: Allow
                  Action:
                    - kms:Decrypt
                  Resource: '*'

    HealthcareDBProxy:
      Type: AWS::RDS::DBProxy
      # DeletionPolicy: Delete allows CloudFormation to replace this resource when
      # immutable properties change (e.g. IdleClientTimeout triggers a replacement).
      # Without this, CloudFormation refuses to update a named resource that requires replace.
      DeletionPolicy: Delete
      UpdateReplacePolicy: Delete
      Properties:
        DBProxyName: ${self:custom.serviceName}-dbproxy
        EngineFamily: POSTGRESQL
        RoleArn: !GetAtt DBProxyRole.Arn
        Auth:
          - AuthScheme: SECRETS
            SecretArn: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
            IAMAuth: DISABLED
        VpcSubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        VpcSecurityGroupIds:
          - !Ref RDSProxySecurityGroup
        RequireTLS: true
        DebugLogging: false
        # 1800s (30 min) — Lambda containers can be reused for hours; 120s caused
        # stale connection errors on the first query after a quiet period.
        IdleClientTimeout: 1800
    HealthcareDBProxyTargetGroup:
      Type: AWS::RDS::DBProxyTargetGroup
      Properties:
        DBProxyName: !Ref HealthcareDBProxy
        TargetGroupName: default
        DBInstanceIdentifiers:
          - !Ref HealthcareRDS
        ConnectionPoolConfigurationInfo:
          MaxConnectionsPercent: 100
          MaxIdleConnectionsPercent: 50
          ConnectionBorrowTimeout: 120

    # ── Secrets Manager ───────────────────────────────────────────────────── #
    YoutubeApiKeySecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: ${self:custom.secrets.youtubeApiKey}
        Description: YouTube Data API v3 key for education video recommendations
        SecretString: '{"api_key": "REPLACE_WITH_ACTUAL_KEY"}'

    # ── Shared IAM Managed Policies ───────────────────────────────────────── #
    XRayTracingPolicy:
      Type: AWS::IAM::ManagedPolicy
      Properties:
        ManagedPolicyName: ${self:custom.serviceName}-xray-tracing
        Description: Allows Lambda functions to send X-Ray trace data
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: '*'

    # ── IAM Roles — one per function, least-privilege ─────────────────────── #

    FallbackRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-fallback-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
