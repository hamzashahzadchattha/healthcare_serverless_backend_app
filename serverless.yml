    # ── Cognito User Pool and Identity Providers ──────────────────────────── #

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:custom.serviceName}-user-pool
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        MfaConfiguration: 'OFF'
        UserPoolAddOns:
          AdvancedSecurityMode: AUDIT
        Schema:
          - Name: email
            AttributeDataType: String
            Required: true
            Mutable: true
        UserPoolTags:
          Environment: ${self:custom.stage}

    GoogleIdentityProvider:
      Type: AWS::Cognito::UserPoolIdentityProvider
      Properties:
        UserPoolId: !Ref CognitoUserPool
        ProviderName: Google
        ProviderType: Google
        ProviderDetails:
          client_id: ${self:custom.cognito.googleClientId}
          client_secret: ${self:custom.cognito.googleClientSecret}
          authorize_scopes: 'email openid profile'
        AttributeMapping:
          email: email
          name: name

    # AppleIdentityProvider — uncomment when Apple Sign in credentials are available
    # AppleIdentityProvider:
    #   Type: AWS::Cognito::UserPoolIdentityProvider
    #   Properties:
    #     UserPoolId: !Ref CognitoUserPool
    #     ProviderName: SignInWithApple
    #     ProviderType: SignInWithApple
    #     ProviderDetails:
    #       client_id: ${self:custom.cognito.appleServicesId}
    #       team_id: ${self:custom.cognito.appleTeamId}
    #       key_id: ${self:custom.cognito.appleKeyId}
    #       private_key: ${self:custom.cognito.applePrivateKey}
    #       authorize_scopes: 'email name'
    #     AttributeMapping:
    #       email: email
    #       name: name

    CognitoAppClient:
      Type: AWS::Cognito::UserPoolClient
      DependsOn:
        - GoogleIdentityProvider
      Properties:
        ClientName: ${self:custom.serviceName}-app-client
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        AllowedOAuthFlows:
          - code
        AllowedOAuthFlowsUserPoolClient: true
        AllowedOAuthScopes:
          - email
          - openid
          - profile
        SupportedIdentityProviders:
          - COGNITO
          - Google
        CallbackURLs:
          - https://app.assesment-healthcare.com/callback
        LogoutURLs:
          - https://app.assesment-healthcare.com/logout
        AccessTokenValidity: 1
        IdTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH

    CognitoUserPoolDomain:
      Type: AWS::Cognito::UserPoolDomain
      Properties:
        # Cognito hosted UI domains are globally unique across all AWS accounts.
        # Appending the account ID ensures uniqueness.
        Domain: !Sub '${self:custom.serviceName}-${AWS::AccountId}'
        UserPoolId: !Ref CognitoUserPool

    # ── Admin IAM Role ────────────────────────────────────────────────────── #

    AdminPatientsRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-admin-patients-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
