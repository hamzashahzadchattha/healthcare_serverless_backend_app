# Healthcare Platform — Serverless Framework

service: healthcare-platform
frameworkVersion: '3'

# ---------------------------------------------------------------------------- #
# Plugins
# ---------------------------------------------------------------------------- #
plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin

# ---------------------------------------------------------------------------- #
# Custom variables — single place to change names across the entire file
# ---------------------------------------------------------------------------- #
custom:
  stage: ${opt:stage, 'dev'}
  serviceName: healthcare-platform-${self:custom.stage}

  settings:
    dev:
      region: us-east-1
      logLevel: DEBUG
      logRetentionDays: 7
      rdsInstanceClass: db.t3.medium
      rdsAllocatedStorage: 20
    prod:
      region: us-east-1
      logLevel: INFO
      logRetentionDays: 30
      rdsInstanceClass: db.t4g.micro
      rdsAllocatedStorage: 20

  region: ${self:custom.settings.${self:custom.stage}.region}
  logLevel: ${self:custom.settings.${self:custom.stage}.logLevel}
  logRetentionDays: ${self:custom.settings.${self:custom.stage}.logRetentionDays}

  pythonRequirements:
    layer: true
    dockerizePip: true
    slim: false
    strip: false
    useDownloadCache: false
    useStaticCache: false

  secrets:
    youtubeApiKey: ${self:custom.serviceName}/youtube-api-key

# ---------------------------------------------------------------------------- #
# Provider — global Lambda defaults
# ---------------------------------------------------------------------------- #
provider:
  name: aws
  runtime: python3.12
  stage: ${self:custom.stage}
  region: ${self:custom.region}
  memorySize: 512
  timeout: 29
  versionFunctions: false
  logRetentionInDays: ${self:custom.logRetentionDays}

  tracing:
    lambda: true
    apiGateway: true

  environment:
    STAGE: ${self:custom.stage}
    REGION: ${self:custom.region}
    DB_SECRET_NAME: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
    DB_HOST: !GetAtt HealthcareRDS.Endpoint.Address
    DB_PORT: !GetAtt HealthcareRDS.Endpoint.Port
    DB_NAME: healthcare_${self:custom.stage}
    YOUTUBE_SECRET_NAME: ${self:custom.secrets.youtubeApiKey}
    SERVICE_NAME: ${self:custom.serviceName}
    LOG_LEVEL: ${self:custom.logLevel}

  httpApi:
    name: ${self:custom.serviceName}-api
    cors:
      allowedOrigins:
        - https://app.assesment-healthcare.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - OPTIONS

  vpc:
    securityGroupIds:
      - !Ref LambdaSecurityGroup
    subnetIds:
      - !Ref PrivateSubnetA
      - !Ref PrivateSubnetB

  iam:

# ---------------------------------------------------------------------------- #
# Package — deploy each function independently to minimise cold-start size
# ---------------------------------------------------------------------------- #
package:
  individually: true
  patterns:
    - '!./**'
    - '!node_modules/**'
    - '!.git/**'
    - '!tests/**'
    - '!*.md'
    - '!.env*'
    - '!db/**'
    - '!docs/**'
    - '!__pycache__/**'

# ---------------------------------------------------------------------------- #
# Functions
# ---------------------------------------------------------------------------- #
functions:

  makeMigrations:
    name: ${self:custom.serviceName}-make-migrations
    handler: src/migrations/handler.handler
    description: Apply Migrations to RDS PostgreSQL database (run once on deployment)
    memorySize: 512
    timeout: 25
    role: DbMigrateRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
    package:
      patterns:
        - 'src/migrations/**'
        - 'src/shared/**'
        - 'src/__init__.py'
        - 'db/**'
    events:
      - httpApi:
          path: /db/migrations
          method: POST
    environment:
      FUNCTION_NAME: make-migrations

  patientRegister:
    name: ${self:custom.serviceName}-patient-register
    handler: src/patients/handler.handler
    description: Creates a new patient record with hashed PII
    memorySize: 768
    timeout: 25
    role: PatientRegisterRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
    package:
      patterns:
        - 'src/patients/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/register
          method: POST
    environment:
      FUNCTION_NAME: patient-register

  appointmentsUpcoming:
    name: ${self:custom.serviceName}-appointments-upcoming
    handler: src/appointments/handler.upcoming_handler
    description: Returns a patient's upcoming appointments
    memorySize: 768
    timeout: 25
    role: AppointmentsReadRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
    package:
      patterns:
        - 'src/appointments/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/appointments/upcoming
          method: GET
    environment:
      FUNCTION_NAME: appointments-upcoming

  appointmentNotes:
    name: ${self:custom.serviceName}-appointment-notes
    handler: src/appointments/handler.notes_handler
    description: Allows doctors to upload post-appointment notes
    memorySize: 768
    timeout: 25
    role: AppointmentNotesRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
    package:
      patterns:
        - 'src/appointments/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /appointments/{appointment_id}/notes
          method: POST
    environment:
      FUNCTION_NAME: appointment-notes

  prescriptionList:
    name: ${self:custom.serviceName}-prescription-list
    handler: src/prescriptions/handler.handler
    description: Fetches prescriptions for a patient with active/past filter
    memorySize: 768
    timeout: 25
    role: PrescriptionReadRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
    package:
      patterns:
        - 'src/prescriptions/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/prescriptions
          method: GET
    environment:
      FUNCTION_NAME: prescription-list

  educationVideos:
    name: ${self:custom.serviceName}-education-videos
    handler: src/education/handler.handler
    description: Returns YouTube video recommendations based on patient condition
    memorySize: 512
    timeout: 25
    role: EducationVideosRole
    layers:
      - Ref: PythonRequirementsLambdaLayer
    package:
      patterns:
        - 'src/education/**'
        - 'src/shared/**'
        - 'src/__init__.py'
    events:
      - httpApi:
          path: /patients/{patient_id}/education-videos
          method: GET
    environment:
      FUNCTION_NAME: education-videos
      CACHE_TTL_SECONDS: '3600'

# ---------------------------------------------------------------------------- #
# Resources — VPC, Subnets, Security Groups, RDS, VPC Endpoints, IAM Roles
# ---------------------------------------------------------------------------- #
resources:
  Resources:

    # ── Networking ────────────────────────────────────────────────────────── #
    HealthcareVPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsHostnames: true
        EnableDnsSupport: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-vpc

    PrivateSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.1.0/24
        AvailabilityZone: ${self:custom.region}a
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-private-a

    PrivateSubnetB:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.2.0/24
        AvailabilityZone: ${self:custom.region}b
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-private-b

    PrivateRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref HealthcareVPC
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-private-rt

    PrivateSubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetA
        RouteTableId: !Ref PrivateRouteTable

    PrivateSubnetBRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetB
        RouteTableId: !Ref PrivateRouteTable

    # ── Internet Gateway + Public Subnet + NAT Gateway ────────────────────── #
    # Required so private-subnet Lambdas can make outbound HTTPS calls
    # (e.g. googleapis.com for YouTube) while still reaching private RDS.
    InternetGateway:
      Type: AWS::EC2::InternetGateway
      Properties:
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-igw

    VPCGatewayAttachment:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref HealthcareVPC
        InternetGatewayId: !Ref InternetGateway

    PublicSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref HealthcareVPC
        CidrBlock: 10.0.10.0/24
        AvailabilityZone: ${self:custom.region}a
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-public-a

    PublicRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref HealthcareVPC
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-public-rt

    PublicRoute:
      Type: AWS::EC2::Route
      DependsOn: VPCGatewayAttachment
      Properties:
        RouteTableId: !Ref PublicRouteTable
        DestinationCidrBlock: '0.0.0.0/0'
        GatewayId: !Ref InternetGateway

    PublicSubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetA
        RouteTableId: !Ref PublicRouteTable

    NatGatewayEIP:
      Type: AWS::EC2::EIP
      DependsOn: VPCGatewayAttachment
      Properties:
        Domain: vpc

    NatGateway:
      Type: AWS::EC2::NatGateway
      Properties:
        AllocationId: !GetAtt NatGatewayEIP.AllocationId
        SubnetId: !Ref PublicSubnetA
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-nat

    # Route all outbound internet traffic from private subnets through NAT
    PrivateInternetRoute:
      Type: AWS::EC2::Route
      Properties:
        RouteTableId: !Ref PrivateRouteTable
        DestinationCidrBlock: '0.0.0.0/0'
        NatGatewayId: !Ref NatGateway

    # ── Security Groups ───────────────────────────────────────────────────── #
    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for Lambda functions
        VpcId: !Ref HealthcareVPC
        SecurityGroupEgress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            CidrIp: 10.0.0.0/16
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: 0.0.0.0/0
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-lambda-sg

    RDSSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for RDS - only accepts traffic from Lambda SG
        VpcId: !Ref HealthcareVPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            SourceSecurityGroupId: !Ref LambdaSecurityGroup
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-rds-sg

    VPCEndpointSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for VPC endpoints - allows HTTPS from Lambda SG
        VpcId: !Ref HealthcareVPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            SourceSecurityGroupId: !Ref LambdaSecurityGroup
        Tags:
          - Key: Name
            Value: ${self:custom.serviceName}-vpce-sg

    # ── VPC Endpoint for Secrets Manager (avoids NAT Gateway cost) ────────── #
    SecretsManagerEndpoint:
      Type: AWS::EC2::VPCEndpoint
      Properties:
        VpcEndpointType: Interface
        ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
        VpcId: !Ref HealthcareVPC
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        PrivateDnsEnabled: true
        SecurityGroupIds:
          - !Ref VPCEndpointSecurityGroup

    # ── RDS PostgreSQL (free-tier) ────────────────────────────────────────── #
    RDSSubnetGroup:
      Type: AWS::RDS::DBSubnetGroup
      Properties:
        DBSubnetGroupDescription: Subnet group for healthcare RDS
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB

    HealthcareRDS:
      Type: AWS::RDS::DBInstance
      DeletionPolicy: Snapshot
      Properties:
        DBInstanceIdentifier: ${self:custom.serviceName}-postgres
        DBInstanceClass: ${self:custom.settings.${self:custom.stage}.rdsInstanceClass}
        Engine: postgres
        EngineVersion: '16.3'
        AllocatedStorage: ${self:custom.settings.${self:custom.stage}.rdsAllocatedStorage}
        StorageType: gp2
        DBName: healthcare_${self:custom.stage}
        MasterUsername: healthcare_admin
        ManageMasterUserPassword: true
        VPCSecurityGroups:
          - !Ref RDSSecurityGroup
        DBSubnetGroupName: !Ref RDSSubnetGroup
        MultiAZ: false
        PubliclyAccessible: false
        BackupRetentionPeriod: 7
        StorageEncrypted: true
        EnablePerformanceInsights: false
        Tags:
          - Key: Environment
            Value: ${self:custom.stage}

    # ── Secrets Manager ───────────────────────────────────────────────────── #
    YoutubeApiKeySecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: ${self:custom.secrets.youtubeApiKey}
        Description: YouTube Data API v3 key for education video recommendations
        SecretString: '{"api_key": "REPLACE_WITH_ACTUAL_KEY"}'

    # ── Shared IAM Managed Policies (eliminates duplication across roles) ── #
    VPCNetworkingPolicy:
      Type: AWS::IAM::ManagedPolicy
      Properties:
        ManagedPolicyName: ${self:custom.serviceName}-vpc-networking
        Description: Allows Lambda functions to manage VPC ENIs
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ec2:CreateNetworkInterface
                - ec2:DescribeNetworkInterfaces
                - ec2:DeleteNetworkInterface
              Resource: '*'

    XRayTracingPolicy:
      Type: AWS::IAM::ManagedPolicy
      Properties:
        ManagedPolicyName: ${self:custom.serviceName}-xray-tracing
        Description: Allows Lambda functions to send X-Ray trace data
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: '*'

    # ── IAM Roles — one per function, least-privilege ─────────────────────── #

    DbMigrateRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-db-migrate-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref VPCNetworkingPolicy
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-make-migrations:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    PatientRegisterRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-patient-register-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref VPCNetworkingPolicy
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-patient-register:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    AppointmentsReadRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-appointments-read-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref VPCNetworkingPolicy
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-appointments-upcoming:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    AppointmentNotesRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-appointment-notes-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref VPCNetworkingPolicy
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-appointment-notes:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    PrescriptionReadRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-prescription-read-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref VPCNetworkingPolicy
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-prescription-list:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !GetAtt HealthcareRDS.MasterUserSecret.SecretArn

    EducationVideosRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:custom.serviceName}-education-videos-role
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - !Ref VPCNetworkingPolicy
          - !Ref XRayTracingPolicy
        Policies:
          - PolicyName: CloudWatchLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${self:custom.serviceName}-education-videos:*'
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource:
                    - !GetAtt HealthcareRDS.MasterUserSecret.SecretArn
                    - !Ref YoutubeApiKeySecret

    # ── CloudWatch Log Groups (explicit — controls retention) ─────────────── #

    PatientRegisterLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-patient-register
        RetentionInDays: ${self:custom.logRetentionDays}

    AppointmentsUpcomingLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-appointments-upcoming
        RetentionInDays: ${self:custom.logRetentionDays}

    AppointmentNotesLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-appointment-notes
        RetentionInDays: ${self:custom.logRetentionDays}

    PrescriptionListLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-prescription-list
        RetentionInDays: ${self:custom.logRetentionDays}

    EducationVideosLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-education-videos
        RetentionInDays: ${self:custom.logRetentionDays}

    # ── CloudWatch Metric Filters ─────────────────────────────────────────── #

    ErrorMetricFilterRegister:
      Type: AWS::Logs::MetricFilter
      DependsOn: PatientRegisterLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-patient-register
        FilterPattern: '{ ($.level = "ERROR") || ($.level = "CRITICAL") }'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: LambdaErrorCount
            MetricValue: "1"
            DefaultValue: 0

    ErrorMetricFilterAppointments:
      Type: AWS::Logs::MetricFilter
      DependsOn: AppointmentsUpcomingLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-appointments-upcoming
        FilterPattern: '{ ($.level = "ERROR") || ($.level = "CRITICAL") }'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: LambdaErrorCount
            MetricValue: "1"
            DefaultValue: 0

    ErrorMetricFilterNotes:
      Type: AWS::Logs::MetricFilter
      DependsOn: AppointmentNotesLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-appointment-notes
        FilterPattern: '{ ($.level = "ERROR") || ($.level = "CRITICAL") }'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: LambdaErrorCount
            MetricValue: "1"
            DefaultValue: 0

    ErrorMetricFilterPrescriptions:
      Type: AWS::Logs::MetricFilter
      DependsOn: PrescriptionListLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-prescription-list
        FilterPattern: '{ ($.level = "ERROR") || ($.level = "CRITICAL") }'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: LambdaErrorCount
            MetricValue: "1"
            DefaultValue: 0

    ErrorMetricFilterVideos:
      Type: AWS::Logs::MetricFilter
      DependsOn: EducationVideosLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-education-videos
        FilterPattern: '{ ($.level = "ERROR") || ($.level = "CRITICAL") }'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: LambdaErrorCount
            MetricValue: "1"
            DefaultValue: 0

    PHILeakMetricFilter:
      Type: AWS::Logs::MetricFilter
      DependsOn: PatientRegisterLogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:custom.serviceName}-patient-register
        FilterPattern: '"[REDACTED]"'
        MetricTransformations:
          - MetricNamespace: HealthcarePlatform/${self:custom.stage}
            MetricName: PHILeakAttemptCount
            MetricValue: "1"
            DefaultValue: 0

    # ── CloudWatch Alarms ─────────────────────────────────────────────────── #

    LambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.serviceName}-lambda-errors
        AlarmDescription: >
          5 or more Lambda ERROR/CRITICAL log lines in 5 minutes.
          Investigate immediately - this may indicate a database outage,
          Secrets Manager failure, or unhandled exception in production.
        Namespace: HealthcarePlatform/${self:custom.stage}
        MetricName: LambdaErrorCount
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    PHILeakAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:custom.serviceName}-phi-leak-attempt
        AlarmDescription: >
          CRITICAL COMPLIANCE ALERT: PHI value scrubber triggered in a log entry.
          A value matching an email, phone, DOB, or SSN pattern was intercepted
          before it reached CloudWatch. Investigate which code path triggered this
          and fix the root cause immediately. Even one occurrence is unacceptable.
        Namespace: HealthcarePlatform/${self:custom.stage}
        MetricName: PHILeakAttemptCount
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching


  Outputs:
    RDSEndpoint:
      Description: RDS PostgreSQL endpoint (internal - never expose publicly)
      Value: !GetAtt HealthcareRDS.Endpoint.Address
      Export:
        Name: ${self:custom.serviceName}-rds-endpoint
